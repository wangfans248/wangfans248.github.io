<!DOCTYPE html>
<html lang="en">
    <head>
        <title></S>earch</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <form action="https://www.google.com/search">
            <h1> Google </h1>
            <h2> Advanced_Search</h2>
           
            <div class="form-group">
            <label for="all_words">All these words:</label>
            <input type="text" name="q" placeholder="Enter words...">
            </div>
            
            <div class="form-group">
            <label for="exact_words">This exact word or phrase:</label>
            <input type="text" name="as_epq" placeholder="Enter exact phrase...">
            </div>

            <div class="form-group">
            <label for="any_words">Any of these words:</label>
            <input type="text" name="as_oq" placeholder="Enter any words...">
            </div>

            <div class="form-group">
            <label for="exclude_words">None of these words:</label>
            <input type="text" name="as_eq" placeholder="Enter words to exclude...">
            </div>

            <input type="submit" value="Search">
        </form>
        <ul>
            <li><a href="file://wsl$/Ubuntu2204/home/wfml/html/Google%20Search/index.html">Google</a></li>
        </ul>
    </body>
</html>
